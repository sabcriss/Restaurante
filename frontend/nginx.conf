server {
    listen 80;
    server_name localhost;

    # Servir arquivos estáticos do frontend (Vite React app)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # O index.html não deve ser cacheado para que o navegador sempre carregue 
        # a versão mais recente contendo as referências corretas aos novos assets.
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Servir os arquivos compilados (JS, CSS, imagens) com cache agressivo, 
    # pois eles possuem hashes únicos gerados pelo Vite e mudam a cada build.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy reverso para as requisições de API direcionadas ao container do backend
    location /api {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
