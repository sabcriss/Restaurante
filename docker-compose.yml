version: '3.8'

services:
  backend:
    container_name: restaurante-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
    restart: unless-stopped
    networks:
      - restaurante-network

  frontend:
    container_name: restaurante-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - restaurante-network

  tunnel:
    container_name: cloudflare-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - restaurante-network

networks:
  restaurante-network:
    driver: bridge
